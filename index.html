<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해커톤 통합 모니터링 대시보드</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --safe-color: #2ecc71;
            --warn-color: #f1c40f;
            --danger-color: #e74c3c;
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 { margin-bottom: 10px; }
        .last-update { font-size: 0.9em; color: #666; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .team-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 8px solid #ddd;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }

        /* 표절 점수 상태별 스타일 */
        .status-safe { border-top-color: var(--safe-color); }
        .status-warn { border-top-color: var(--warn-color); }
        .status-danger { border-top-color: var(--danger-color); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .team-info h2 { margin: 0; font-size: 1.4em; }
        .team-info p { margin: 4px 0; color: #7f8c8d; font-size: 0.9em; }

        .plag-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
            color: white;
        }

        .bg-safe { background-color: var(--safe-color); }
        .bg-warn { background-color: var(--warn-color); color: #2c3e50; }
        .bg-danger { background-color: var(--danger-color); }

        .repobeats-img {
            width: 100%;
            border-radius: 8px;
            background: #fafafa;
            min-height: 200px;
            display: block;
        }

        .footer-links {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            font-size: 0.85em;
        }

        .footer-links a {
            text-decoration: none;
            color: #3498db;
            font-weight: 500;
        }

        .footer-links a:hover { text-decoration: underline; }

        @media (max-width: 500px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>🛡️ Project Monitoring System</h1>
    <p class="last-update">최종 업데이트: <span id="update-time"></span></p>
</header>

<div class="dashboard-grid" id="dashboard-container">
    </div>

<script>
    // 1. 학생/팀 데이터 (이 부분을 교수님이 수정하시면 됩니다)
    const teams = [
        { name: "1팀 (Alpha)", id: "user1", repo: "project-a", plagScore: 12, similarWith: "N/A" },
        { name: "2팀 (Beta)", id: "user2", repo: "project-b", plagScore: 45, similarWith: "OpenSource_A" },
        { name: "3팀 (Gamma)", id: "user3", repo: "project-c", plagScore: 88, similarWith: "Past_Assignment_02" },
        { name: "4팀 (Delta)", id: "cgseong", repo: "github-leaderboard", plagScore: 5, similarWith: "N/A" }
        { name: "5팀 (Astro)", id: "cgseong", repo: "github-leaderboard", plagScore: 5, similarWith: "N/A" }
    ];

    const container = document.getElementById('dashboard-container');

    // 2. 카드 생성 로직
    teams.forEach(team => {
        let statusClass = "status-safe";
        let badgeClass = "bg-safe";

        if (team.plagScore >= 70) {
            statusClass = "status-danger";
            badgeClass = "bg-danger";
        } else if (team.plagScore >= 30) {
            statusClass = "status-warn";
            badgeClass = "bg-warn";
        }

        const imgUrl = `https://github.com/${team.id}/${team.repo}/raw/main/repobeats/plots/_stats.svg`;
        
        const cardHtml = `
            <div class="team-card ${statusClass}">
                <div class="card-header">
                    <div class="team-info">
                        <h2>${team.name}</h2>
                        <p>GitHub ID: ${team.id}</p>
                    </div>
                    <div class="plag-badge ${badgeClass}">표절율 ${team.plagScore}%</div>
                </div>
                <img src="${imgUrl}" class="repobeats-img" onerror="this.src='https://via.placeholder.com/400x200?text=Wait+for+Sync+or+Check+Action'">
                <div class="footer-links">
                    <span>⚠️ 유사대상: ${team.similarWith}</span>
                    <a href="https://github.com/${team.id}/${team.repo}" target="_blank">Repository ↗</a>
                </div>
            </div>
        `;
        container.innerHTML += cardHtml;
    });

    // 업데이트 시간 표시
    document.getElementById('update-time').innerText = new Date().toLocaleString();
</script>

</body>
</html>
