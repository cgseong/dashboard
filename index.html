<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>해커톤 실시간 모니터링 v3.1 (CSV + 커밋 수)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 반응형 필수 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --bg-color: #f4f7f9;
      --card-bg: #ffffff;
      --safe-color: #2ecc71;
      --warn-color: #f1c40f;
      --danger-color: #e74c3c;
      --primary-color: #3498db;
      --text-main: #2c3e50;
    }
    body {
      font-family: 'Pretendard', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 16px;
    }
    header {
      text-align: center;
      margin-bottom: 24px;
      padding: 0 8px;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }
    .controls {
      max-width: 1400px;
      margin: 0 auto 24px;
      background: #ffffff;
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .controls-left {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      background-color: #fff;
      min-width: 140px;
    }
    .controls button {
      padding: 8px 16px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .controls button:hover {
      opacity: 0.9;
    }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); /* 모바일에서 한 칼럼, 큰 화면에서 여러 칼럼 */
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto 24px;
    }
    .team-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-top: 8px solid #ddd;
      transition: all 0.3s ease;
    }
    .team-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }
    .status-safe {
      border-top-color: var(--safe-color);
    }
    .status-warn {
      border-top-color: var(--warn-color);
    }
    .status-danger {
      border-top-color: var(--danger-color);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }
    .card-header h2 {
      margin: 0;
      font-size: 1.05rem;
      word-break: keep-all;
    }
    .card-header small {
      display: block;
      color: #7f8c8d;
      font-size: 0.8rem;
      word-break: break-all;
    }
    .plag-badge {
      padding: 5px 12px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      font-size: 0.8em;
      white-space: nowrap;
    }
    .bg-safe {
      background-color: var(--safe-color);
    }
    .bg-warn {
      background-color: var(--warn-color);
      color: #000;
    }
    .bg-danger {
      background-color: var(--danger-color);
    }
    .repobeats-img {
      width: 100%;
      border-radius: 8px;
      margin: 10px 0;
      background: #fdfdfd;
      min-height: 180px;
      object-fit: cover;
    }
    .footer {
      font-size: 0.8em;
      color: #7f8c8d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .repo-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
    }
    .repo-link:hover {
      text-decoration: underline;
    }
    .timer-text {
      font-size: 0.85rem;
      color: #7f8c8d;
    }

    /* --- 반응형 튜닝 --- */

    /* 작은 태블릿 & 모바일 (≤ 768px) */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      header h1 {
        font-size: 1.3rem;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls-left {
        width: 100%;
        justify-content: space-between;
      }
      .controls select {
        flex: 1 1 48%;
      }
      .controls button {
        width: 100%;
        text-align: center;
      }
      .dashboard-grid {
        grid-template-columns: 1fr; /* 항상 한 칼럼 */
      }
      .team-card {
        padding: 14px;
      }
      .card-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .plag-badge {
        align-self: flex-start;
      }
    }

    /* 아주 작은 화면 (≤ 480px) */
    @media (max-width: 480px) {
      header h1 {
        font-size: 1.15rem;
      }
      .timer-text {
        font-size: 0.8rem;
      }
      .card-header h2 {
        font-size: 1rem;
      }
      .repobeats-img {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🛡️ 해커톤 실시간 모니터링 v3.1</h1>
  <p class="timer-text">
    자동 갱신까지 ⏳ <span id="timer">300</span>초 |
    최종 업데이트: <span id="update-time">-</span>
  </p>
</header>

<div class="controls">
  <div class="controls-left">
    <select id="filter-select" onchange="renderDashboard()">
      <option value="all">전체 보기</option>
      <option value="danger">위험군 (표절 70%↑)</option>
      <option value="warning">주의군 (표절 30%↑)</option>
    </select>
    <select id="sort-select" onchange="renderDashboard()">
      <option value="name">팀명순</option>
      <option value="plag-desc">표절 점수 높은순</option>
      <option value="plag-asc">표절 점수 낮은순</option>
      <option value="commits-desc">커밋 수 많은순</option>
      <option value="commits-asc">커밋 수 적은순</option>
    </select>
  </div>
  <button onclick="loadData()">데이터 다시 읽기</button>
</div>

<div class="dashboard-grid" id="dashboard-container"></div>

<script>
  let teams = []; // CSV에서 읽어올 데이터
  let timeLeft = 300;

  function loadData() {
    Papa.parse("teams.csv", {
      download: true,
      header: true,
      dynamicTyping: true,
      complete: function(results) {
        teams = results.data.filter(row => row.name);
        renderDashboard();
      },
      error: function(err) {
        console.error("CSV 로드 실패:", err);
        alert("teams.csv 파일을 찾을 수 없습니다.");
      }
    });
  }

  function renderDashboard() {
    const filter = document.getElementById('filter-select').value;
    const sort = document.getElementById('sort-select').value;
    const container = document.getElementById('dashboard-container');

    let displayTeams = [...teams];

    displayTeams = displayTeams.filter(t => {
      const score = Number(t.plagScore) || 0;
      if (filter === 'danger') return score >= 70;
      if (filter === 'warning') return score >= 30;
      return true;
    });

    displayTeams.sort((a, b) => {
      const aPlag = Number(a.plagScore) || 0;
      const bPlag = Number(b.plagScore) || 0;
      const aCommits = Number(a.commits) || 0;
      const bCommits = Number(b.commits) || 0;

      if (sort === 'name') return a.name.localeCompare(b.name);
      if (sort === 'plag-desc') return bPlag - aPlag;
      if (sort === 'plag-asc') return aPlag - bPlag;
      if (sort === 'commits-desc') return bCommits - aCommits;
      if (sort === 'commits-asc') return aCommits - bCommits;
      return 0;
    });

    container.innerHTML = '';
    displayTeams.forEach(team => {
      const score = Number(team.plagScore) || 0;
      const commits = Number(team.commits) || 0;

      const statusClass =
        score >= 70 ? "status-danger" :
        score >= 30 ? "status-warn" : "status-safe";
      const badgeClass =
        score >= 70 ? "bg-danger" :
        score >= 30 ? "bg-warn" : "bg-safe";

      const imgUrl = `https://github.com/${team.id}/${team.repo}/raw/main/repobeats/plots/_stats.svg`;

      container.innerHTML += `
        <div class="team-card ${statusClass}">
          <div class="card-header">
            <div>
              <h2>${team.name}</h2>
              <small>${team.id} / ${team.repo}</small>
            </div>
            <div class="plag-badge ${badgeClass}">
              표절 ${score}% 
            </div>
          </div>
          <img
            src="${imgUrl}"
            class="repobeats-img"
            onerror="this.src='https://via.placeholder.com/400x200?text=Wait+for+Sync'"
          >
          <div class="footer">
            <span>⚠️ 유사: ${team.similarWith || '-'}</span>
            <span>📌 커밋: ${commits}회</span>
            <a href="https://github.com/${team.id}/${team.repo}" class="repo-link" target="_blank">
              View Repo ↗
            </a>
          </div>
        </div>
      `;
    });

    document.getElementById('update-time').innerText = new Date().toLocaleTimeString();
  }

  setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      location.reload();
    } else {
      document.getElementById('timer').innerText = timeLeft;
    }
  }, 1000);

  window.onload = loadData;
</script>

</body>
</html>
