name: Update commit counts

on:
  schedule:
    - cron: "0 2 * * *"   # 매일 02:00 UTC에 자동 실행
  workflow_dispatch:       # 필요할 때 수동 실행

jobs:
  update-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # teams.csv를 수정하고 푸시해야 하므로 write 권한[web:219]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # 원하면 다른 버전으로 변경 가능[web:232]

      - name: Install dependencies
        run: pip install requests

      - name: Update commits in teams.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_commits.py

      - name: Commit updated CSV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add teams.csv
          git commit -m "chore: update commit counts" || echo "Nothing to commit"
          git push
